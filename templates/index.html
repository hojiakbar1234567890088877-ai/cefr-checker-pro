<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEFR Exam Simulator - Hojiakbar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --main-color: #1a2a6c; }
        .gender-male { --main-color: #004e92; background: linear-gradient(135deg, #004e92, #000428); }
        .gender-female { --main-color: #ff0084; background: linear-gradient(135deg, #ff0084, #33001b); }

        body { min-height: 100vh; font-family: 'Poppins', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; background: #1a2a6c; transition: 1s; color: #333; }

        /* STEP 0: INTRO */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a2a6c; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000;
            text-align: center; color: white; transition: opacity 1s;
        }
        .loader-bar { width: 250px; height: 5px; background: rgba(255,255,255,0.2); margin-top: 20px; border-radius: 10px; overflow: hidden; }
        .loader-fill { width: 0%; height: 100%; background: #ffd700; animation: load 5s linear forwards; }
        @keyframes load { to { width: 100%; } }

        /* CONTAINERS */
        .glass-box { background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 100%; max-width: 500px; display: none; animation: fadeIn 0.8s; }
        #exam-screen { max-width: 1100px; height: 90vh; overflow-y: auto; }

        .timer-box { position: sticky; top: 0; background: var(--main-color); color: white; padding: 12px; border-radius: 50px; text-align: center; font-size: 22px; font-weight: bold; z-index: 100; margin-bottom: 20px; }
        
        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Certificate Style */
        .cert-card { display: none; width: 800px; height: 550px; padding: 40px; border: 15px solid var(--main-color); background: white; margin: 20px auto; position: relative; text-align: center; }
    </style>
</head>
<body class="gender-male">

<div id="welcome-screen">
    <h1 style="font-size: 2.5rem; font-weight: 800; line-height: 1.4;">
        Muhammadiyev Hojiakbar Tomonidan yaratilgan <br>
        <span style="color: #ffd700;">CEFR Checker</span>-ga xush kelibsiz!
    </h1>
    <div class="loader-bar"><div class="loader-fill"></div></div>
    <p class="mt-3">Yuklanmoqda...</p>
</div>

<div id="auth-screen" class="glass-box text-center">
    <h2 class="mb-4">Ro'yxatdan o'tish</h2>
    <input type="text" id="fullName" class="form-control form-control-lg mb-3" placeholder="Ism va Familiyangiz">
    <div class="d-flex gap-2 mb-3">
        <button onclick="setGender('male')" class="btn btn-primary w-100 py-2">O'g'il bola</button>
        <button onclick="setGender('female')" class="btn btn-danger w-100 py-2">Qiz bola</button>
    </div>
</div>

<div id="topic-screen" class="glass-box">
    <h3 class="text-center mb-4">Imtihon Mavzulari</h3>
    <input type="text" id="t11_topic" class="form-control mb-3" placeholder="Task 1.1 Mavzusi">
    <input type="text" id="t12_topic" class="form-control mb-3" placeholder="Task 1.2 Mavzusi">
    <input type="text" id="t2_topic" class="form-control mb-3" placeholder="Task 2 (Essay) Mavzusi">
    <button onclick="startExam()" class="btn btn-dark w-100 btn-lg">Imtihonni Boshlash</button>
</div>

<div id="exam-screen" class="glass-box">
    <div class="timer-box" id="timer">60:00</div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <h6 id="display_t11" class="fw-bold">Task 1.1</h6>
            <textarea id="ans11" class="form-control" rows="6" placeholder="Javobingiz..."></textarea>
        </div>
        <div class="col-md-6 mb-3">
            <h6 id="display_t12" class="fw-bold">Task 1.2</h6>
            <textarea id="ans12" class="form-control" rows="6" placeholder="Javobingiz..."></textarea>
        </div>
        <div class="col-12 mb-3">
            <h6 id="display_t2" class="fw-bold">Task 2 (Essay)</h6>
            <textarea id="ans2" class="form-control" rows="10" placeholder="Essayni shu yerga yozing..."></textarea>
        </div>
    </div>
    <button onclick="submitExam()" id="submitBtn" class="btn btn-success btn-lg w-100 mt-2">Imtihonni Yakunlash</button>
    <div id="loading" class="text-center mt-3 hidden"><h4>AI tahlil qilmoqda, kuting...</h4></div>
    
    <div id="certificate" class="cert-card mt-4">
        <h1 style="font-weight: 900; color: var(--main-color);">CERTIFICATE</h1>
        <p class="mt-4">This is to certify that</p>
        <h2 id="certName" style="text-decoration: underline;"></h2>
        <p>successfully passed the CEFR writing exam with a score of</p>
        <h1 id="certScore" style="color: red; font-size: 55px;">0</h1>
        <div id="qrcode" style="position: absolute; bottom: 30px; right: 30px;"></div>
    </div>
</div>

<script>
    // 1. Intro 5 soniya
    window.onload = function() {
        setTimeout(() => {
            const welcome = document.getElementById('welcome-screen');
            welcome.style.opacity = '0';
            setTimeout(() => {
                welcome.style.display = 'none';
                document.getElementById('auth-screen').style.display = 'block';
            }, 1000);
        }, 5000);
    };

    let gender = 'male';
    let timeLeft = 3600;
    let timerId;

    function setGender(g) {
        if (!document.getElementById('fullName').value) { alert("Ismingizni kiriting!"); return; }
        gender = g;
        document.body.className = 'gender-' + g;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('topic-screen').style.display = 'block';
    }

    function startExam() {
        document.getElementById('display_t11').innerText = "Task 1.1: " + document.getElementById('t11_topic').value;
        document.getElementById('display_t12').innerText = "Task 1.2: " + document.getElementById('t12_topic').value;
        document.getElementById('display_t2').innerText = "Task 2: " + document.getElementById('t2_topic').value;
        
        document.getElementById('topic-screen').style.display = 'none';
        document.getElementById('exam-screen').style.display = 'block';
        timerId = setInterval(updateTimer, 1000);
    }

    function updateTimer() {
        let mins = Math.floor(timeLeft / 60);
        let secs = timeLeft % 60;
        document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        if (timeLeft <= 0) { clearInterval(timerId); submitExam(); }
        timeLeft--;
    }

    async function submitExam() {
        clearInterval(timerId);
        document.getElementById('submitBtn').classList.add('hidden');
        document.getElementById('loading').classList.remove('hidden');

        try {
            const response = await fetch('/evaluate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    task11: document.getElementById('ans11').value,
                    task12: document.getElementById('ans12').value,
                    task2: document.getElementById('ans2').value
                })
            });
            const data = await response.json();
            document.getElementById('loading').classList.add('hidden');

            let score = data.total_score || 0;
            if (score >= 38) {
                document.getElementById('certificate').style.display = 'block';
                document.getElementById('certName').innerText = document.getElementById('fullName').value;
                document.getElementById('certScore').innerText = score;
                new QRCode(document.getElementById("qrcode"), { text: "Verified Hojiakbar AI", width: 80, height: 80 });
            }
            alert("Sizning balingiz: " + score + "\n\nFeedback: " + data.feedback);
        } catch (e) {
            alert("Xatolik yuz berdi. Internetni tekshiring.");
            document.getElementById('submitBtn').classList.remove('hidden');
        }
    }
</script>
</body>
</html>
