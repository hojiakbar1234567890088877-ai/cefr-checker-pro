<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEFR Exam Simulator - Hojiakbar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --main-color: #1a2a6c; --sub-color: #b21f1f; }
        .gender-male { --main-color: #004e92; background: linear-gradient(135deg, #004e92, #000428); }
        .gender-female { --main-color: #ff0084; background: linear-gradient(135deg, #ff0084, #33001b); }

        body { min-height: 100vh; font-family: 'Poppins', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; background: #1a2a6c; color: white; transition: 1s; }

        /* STEP 0: 5 SONIYALIK INTRO */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a2a6c; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000;
            text-align: center; transition: opacity 1s ease;
        }
        .loader-bar { width: 200px; height: 4px; background: rgba(255,255,255,0.2); margin-top: 20px; border-radius: 10px; overflow: hidden; }
        .loader-fill { width: 0%; height: 100%; background: white; animation: load 5s linear forwards; }
        @keyframes load { to { width: 100%; } }

        /* STEP 1: AUTH SCREEN */
        #auth-screen { display: none; background: white; padding: 40px; border-radius: 20px; color: #333; width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); animation: fadeIn 1s; }

        /* STEP 2 & 3 (Qolganlari avvalgidek...) */
        #topic-screen, #exam-screen { display: none; background: white; border-radius: 20px; color: #333; }
        #exam-screen { width: 95%; max-width: 1200px; padding: 30px; height: 90vh; overflow-y: auto; }
        
        .timer-box { position: sticky; top: 0; background: var(--main-color); color: white; padding: 10px; border-radius: 50px; text-align: center; font-weight: bold; margin-bottom: 20px; }
        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="gender-male">

<div id="welcome-screen">
    <h1 style="font-size: 3rem; font-weight: 800; padding: 20px;">
        Muhammadiyev Hojiakbar Tomonidan yaratilgan <br>
        <span style="color: #ffd700;">CEFR Checker</span>-ga xush kelibsiz!
    </h1>
    <div class="loader-bar"><div class="loader-fill"></div></div>
    <p class="mt-3">Tayyorlanmoqda...</p>
</div>

<div id="auth-screen">
    <h2 class="mb-4 text-center">Tizimga kirish</h2>
    <input type="text" id="fullName" class="form-control mb-3" placeholder="Ism va Familiyangiz">
    <div class="d-flex justify-content-between mb-4">
        <button onclick="setGender('male')" class="btn btn-primary w-100 me-2">O'g'il bola</button>
        <button onclick="setGender('female')" class="btn btn-danger w-100 ms-2">Qiz bola</button>
    </div>
</div>

<div id="topic-screen" class="p-5">
    <h3 class="text-center mb-4">Imtihon Mavzulari</h3>
    <input type="text" id="t11_topic" class="form-control mb-3" placeholder="Task 1.1 Mavzusi">
    <input type="text" id="t12_topic" class="form-control mb-3" placeholder="Task 1.2 Mavzusi">
    <input type="text" id="t2_topic" class="form-control mb-3" placeholder="Task 2 Mavzusi">
    <button onclick="startExam()" class="btn btn-dark w-100">Boshlash (1 soat)</button>
</div>

<div id="exam-screen">
    <div class="timer-box" id="timer">60:00</div>
    <div class="row">
        <div class="col-md-6 mb-4">
            <h5 id="display_t11">Task 1.1</h5>
            <textarea id="ans11" class="form-control" rows="8"></textarea>
        </div>
        <div class="col-md-6 mb-4">
            <h5 id="display_t12">Task 1.2</h5>
            <textarea id="ans12" class="form-control" rows="8"></textarea>
        </div>
        <div class="col-12">
            <h5 id="display_t2">Task 2</h5>
            <textarea id="ans2" class="form-control" rows="12"></textarea>
        </div>
    </div>
    <button onclick="submitExam()" id="submitBtn" class="btn btn-success btn-lg w-100 mt-4">Yakunlash</button>
</div>

<script>
    // 1. Intro 5 soniya turishi uchun:
    window.onload = function() {
        setTimeout(() => {
            const welcome = document.getElementById('welcome-screen');
            welcome.style.opacity = '0';
            setTimeout(() => {
                welcome.style.display = 'none';
                document.getElementById('auth-screen').style.display = 'block';
            }, 1000);
        }, 5000); // 5 soniya kutiladi
    };

    let gender = 'male';
    let timeLeft = 3600;
    let timerId;

    function setGender(g) {
        gender = g;
        document.body.className = 'gender-' + g;
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('topic-screen').style.display = 'block';
    }

    function startExam() {
        document.getElementById('display_t11').innerText = "Task 1.1: " + document.getElementById('t11_topic').value;
        document.getElementById('display_t12').innerText = "Task 1.2: " + document.getElementById('t12_topic').value;
        document.getElementById('display_t2').innerText = "Task 2: " + document.getElementById('t2_topic').value;
        
        document.getElementById('topic-screen').classList.add('hidden');
        document.getElementById('exam-screen').style.display = 'block';
        timerId = setInterval(updateTimer, 1000);
    }

    function updateTimer() {
        let mins = Math.floor(timeLeft / 60);
        let secs = timeLeft % 60;
        document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        if (timeLeft <= 0) { clearInterval(timerId); submitExam(); }
        timeLeft--;
    }

    async function submitExam() {
        // Avvalgi app.py ga yuborish kodi bu yerga tushadi
        alert("Imtihon topshirildi! Tekshiruv kutilmoqda...");
    }
</script>
</body>
</html>
